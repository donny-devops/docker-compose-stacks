global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    stack: monitoring-analytics

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: node-exporter
    static_configs:
      - targets: [node-exporter:9100]

  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]

  - job_name: grafana
    static_configs:
      - targets: [grafana:3000]

  # Add your application scrape targets below:
  # - job_name: my-app
  #   static_configs:
  #     - targets: [my-app:8000]
  #   metrics_path: /metrics
