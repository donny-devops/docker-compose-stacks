name: homelab-dashboard

# ─────────────────────────────────────────────
#  Homelab Dashboard Stack
#  Services:
#    - Traefik     — reverse proxy + TLS termination  :80 :443 :8080
#    - Homepage    — start-page dashboard              :3000
#    - Portainer   — container management UI           :9443
#    - Heimdall    — application launcher              :7080
#    - Uptime Kuma — service uptime monitor            :3001
#    - Watchtower  — automatic image updater           (no port)
# ─────────────────────────────────────────────

services:

  # ── Reverse Proxy ──────────────────────────
  traefik:
    image: traefik:v3.1
    container_name: traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --api.insecure=true          # set to false and use HTTPS in production
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Uncomment for Let's Encrypt TLS:
      # - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      # - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      # - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      # - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"     # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-letsencrypt:/letsencrypt
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN:-localhost}`)
      - traefik.http.routers.traefik.service=api@internal

  # ── Start-page Dashboard ───────────────────
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      - homepage-config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.homepage.rule=Host(`${DOMAIN:-localhost}`)
      - traefik.http.routers.homepage.entrypoints=web
      - traefik.http.services.homepage.loadbalancer.server.port=3000
    ports:
      - "3000:3000"

  # ── Container Management ───────────────────
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer-data:/data
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.portainer.rule=Host(`portainer.${DOMAIN:-localhost}`)
      - traefik.http.routers.portainer.entrypoints=websecure
      - traefik.http.services.portainer.loadbalancer.server.port=9000
      - traefik.http.services.portainer.loadbalancer.server.scheme=https
    ports:
      - "9443:9443"
      - "9000:9000"

  # ── Application Launcher ───────────────────
  heimdall:
    image: lscr.io/linuxserver/heimdall:latest
    container_name: heimdall
    restart: unless-stopped
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-UTC}
    volumes:
      - heimdall-config:/config
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.heimdall.rule=Host(`apps.${DOMAIN:-localhost}`)
      - traefik.http.routers.heimdall.entrypoints=web
      - traefik.http.services.heimdall.loadbalancer.server.port=80
    ports:
      - "7080:80"

  # ── Uptime Monitor ─────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime-kuma-data:/app/data
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.uptime.rule=Host(`uptime.${DOMAIN:-localhost}`)
      - traefik.http.routers.uptime.entrypoints=web
      - traefik.http.services.uptime.loadbalancer.server.port=3001
    ports:
      - "3001:3001"

  # ── Automatic Image Updater ────────────────
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_SCHEDULE: "0 0 4 * * *"    # daily at 04:00
      WATCHTOWER_NOTIFICATIONS: slack
      WATCHTOWER_NOTIFICATION_SLACK_HOOK_URL: ${SLACK_WEBHOOK_URL:-}
      WATCHTOWER_NOTIFICATION_SLACK_CHANNEL: ${SLACK_CHANNEL:-#homelab}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy

volumes:
  traefik-letsencrypt:
  homepage-config:
  portainer-data:
  heimdall-config:
  uptime-kuma-data:

networks:
  proxy:
    name: homelab-proxy
    driver: bridge
